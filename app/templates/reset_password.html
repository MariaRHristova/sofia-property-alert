<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }} - Reset password</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="shell">
      <main id="main-content">
        <section class="panel auth-panel auth-panel--single">
          <div class="section-heading">
            <div>
              <p class="section-kicker">Account recovery</p>
              <h1>Choose a new password</h1>
            </div>
          </div>
          <p class="section-intro">Use at least 15 characters. Spaces are allowed.</p>
          <form method="post" action="/auth/password/reset" class="stack-form">
            <input type="hidden" name="token" value="{{ token }}" />
            <label>
              <span class="label-text">New password</span>
              <input name="password" type="password" autocomplete="new-password" minlength="15" required />
            </label>
            <button class="primary" type="submit">Save new password</button>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
